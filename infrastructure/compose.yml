version: '3.8'

services:

  # Service Discovery

  eureka-server:
    image: housebooker/eureka-server:latest
    container_name: housebooker-eureka
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - housebooker-network

  # Kafka & Zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: housebooker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - housebooker-network

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: housebooker-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - housebooker-network

  # Databases

  postgres-auth:
    image: postgres:13
    container_name: housebooker-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - housebooker-network

  postgres-user:
    image: postgres:13
    container_name: housebooker-postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - housebooker-network

  postgres-house:
    image: postgres:13
    container_name: housebooker-postgres-house
    environment:
      POSTGRES_DB: house_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-house-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - housebooker-network

  postgres-booking:
    image: postgres:13
    container_name: housebooker-postgres-booking
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-booking-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - housebooker-network

# Add other databases as needed

volumes:
  postgres-auth-data:
  postgres-user-data:
  postgres-house-data:
  postgres-booking-data:

networks:
  housebooker-network:
    driver: bridge