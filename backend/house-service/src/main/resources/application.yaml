spring:
  application:
    name: house-service

  datasource:
    url: jdbc:postgresql://localhost:5432/db_logements
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8083

  servlet:
    context-path: /api/v1