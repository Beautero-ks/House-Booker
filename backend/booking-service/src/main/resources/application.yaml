spring:
  application:
    name: booking-service
    graphql:
      schema:
        locations: classpath:graphql/
        file-extensions: .graphqls
      cors:
        allowed-origins: "*"
    datasource:
      url: jdbc:postgresql://localhost:5432/booking_db
      username: postgres
      password: root
      driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: http://auth-service:8080/auth/realms/housebooker
            jwk-set-uri: http://auth-service:8080/auth/realms/housebooker/protocol/openid-connect/certs

  server:
    port: 8082

  eureka:
    client:
      service-url:
        defaultZone: http://eureka-server:8761/eureka/

  house-service:
    url: http://house-service:8080

  user-service:
    url: http://user-service:8080

  kafka:
    bootstrap-servers: kafka:9092