# =====================================================
# APPLICATION.YML - Configuration du service Notification
# =====================================================
# Profil par défaut : dev (H2, pas de Redis/Kafka obligatoire)
# Pour utiliser Docker (PostgreSQL, Redis, Kafka), lancez avec :
#   --spring.profiles.active=docker
# =====================================================

server:
  port: 8083
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 5000
    accept-count: 100
    connection-timeout: 5000
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: notification-service
  profiles:
    active: dev   # Par défaut, développement sans dépendances externes

# ==================== Configuration par défaut (dev) ====================
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:notification_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.housebooker.common.event,com.housebooker.notification.dto
        spring.json.type.mapping: >
          BookingCreatedEvent:com.housebooker.common.event.BookingCreatedEvent,
          PaymentCompletedEvent:com.housebooker.common.event.PaymentCompletedEvent,
          ContractGeneratedEvent:com.housebooker.common.event.ContractGeneratedEvent
    listener:
      ack-mode: manual
      concurrency: 3
    properties:
      max.poll.records: 50

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

cache:
  type: redis
  redis:
    time-to-live: 3600000
    cache-null-values: false

logging:
  level:
    com.housebooker.notification: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

notification:
  kafka:
    topics:
      email: notifications.email
      sms: notifications.sms
      push: notifications.push
      in-app: notifications.in-app
  rate-limit:
    email:
      max-requests: 10
      window-seconds: 3600
    sms:
      max-requests: 5
      window-seconds: 3600
    push:
      max-requests: 20
      window-seconds: 3600
    in-app:
      max-requests: 100
      window-seconds: 3600
  retry:
    max-attempts: 3
    initial-delay: 5000
    multiplier: 2.0
  dedupe:
    ttl-seconds: 86400

# ==================== PROFIL DOCKER ====================
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      leak-detection-threshold: 10000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group-docker
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.housebooker.common.event,com.housebooker.notification.dto
        spring.json.type.mapping: >
          BookingCreatedEvent:com.housebooker.common.event.BookingCreatedEvent,
          PaymentCompletedEvent:com.housebooker.common.event.PaymentCompletedEvent,
          ContractGeneratedEvent:com.housebooker.common.event.ContractGeneratedEvent
    listener:
      ack-mode: manual
      concurrency: 3
    properties:
      max.poll.records: 50

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# --- Configuration Actuator pour le profil docker ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    com.housebooker.notification: INFO
    org.hibernate: WARN
    org.apache.kafka: WARN

notification:
  channels:
    email:
      enabled: true
      mock: true
    sms:
      enabled: false
    push:
      enabled: false
    in-app:
      enabled: true

# ==================== PROFIL PRODUCTION ====================
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-notification:5432/housebooker_notification}
    username: ${DB_USER:notification_user}
    password: ${DB_PASSWORD:strong_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: notification-group-prod

# --- Configuration Actuator pour le profil prod ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    com.housebooker.notification: WARN
    org.hibernate: ERROR
    org.apache.kafka: WARN
  file:
    name: /var/log/notification-service/app.log

notification:
  channels:
    email:
      enabled: true
      host: ${SMTP_HOST}
      port: ${SMTP_PORT}
      username: ${SMTP_USER}
      password: ${SMTP_PASSWORD}
    sms:
      enabled: ${SMS_ENABLED:false}
    push:
      enabled: ${PUSH_ENABLED:false}
    in-app:
      enabled: true