global:
  scrape_interval: 15s

scrape_configs:
  # Votre service de notification (tourne sur l'hôte)
  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8083']

  # Exporters (noms exacts des conteneurs depuis docker-compose.yml)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['notification-postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['notification-redis-exporter:9121']

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['notification-kafka-exporter:9308']